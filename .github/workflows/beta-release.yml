name: Beta Release for v1

on:
  push:
    tags:
      - 'v1.[0-9]+.[0-9]+-beta.[0-9]+'

permissions:
  contents: write

env:
  GO_VERSION: '1.25'

jobs:
  release:
    name: Beta Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binaries with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --config .goreleaser/beta.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums
        run: |
          cd dist/release
          sha256sum plugin-*.zst > checksums.txt
          cat checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} (Beta)
          prerelease: true
          files: |
            dist/release/plugin-*.zst
            dist/release/checksums.txt
          body: |
            ## Beta Release

            This is a beta release of the drone-har plugin.

            ## Installation

            Download the `.zst` artifact for your platform, decompress it, and place the binary on your `PATH`.

            ```bash
            zstd -d plugin-linux-amd64.zst -o drone-har
            chmod +x drone-har
            sudo mv drone-har /usr/local/bin/
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
